<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On This Day in History</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'EB Garamond', serif;
            margin: 0;
            min-height: 100vh;
            background: 
                linear-gradient(rgba(245, 240, 225, 0.92), rgba(245, 240, 225, 0.75)),
                url('https://images.pexels.com/photos/247671/pexels-photo-247671.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2') center/cover no-repeat fixed;
            background-blend-mode: overlay;
            color: #3c2f2f;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #fact-container {
            max-width: 720px;
            background: #f9f5e8;
            padding: 50px 60px;
            border-radius: 8px;
            box-shadow: 
                0 10px 30px rgba(60, 47, 47, 0.15),
                inset 0 0 40px rgba(139, 69, 19, 0.08);
            position: relative;
            border: 1px solid rgba(139, 69, 19, 0.15);
        }
        #fact-container::before {
            content: "";
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle at 30% 70%, rgba(255,255,240,0.4) 0%, transparent 70%);
            pointer-events: none;
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            color: #8b4513;
            margin: 0 0 0.5rem;
            text-align: center;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }
        #date-header {
            font-size: 1.6rem;
            color: #5c4033;
            text-align: center;
            margin: 0 0 1.8rem;
            font-style: italic;
            letter-spacing: 0.5px;
        }
        #fact {
            font-size: 1.4rem;
            line-height: 1.7;
            margin: 1.5rem 0 2rem;
            color: #2f1f0f;
        }
        #controls {
            text-align: center;
            margin: 1.5rem 0 2rem;
        }
        select {
            font-family: 'EB Garamond', serif;
            font-size: 1.2rem;
            padding: 8px 16px;
            border: 1px solid #8b4513;
            border-radius: 6px;
            background: #fffef0;
            color: #3c2f2f;
            cursor: pointer;
        }

        /* Simple blue link */
        #epoch-link {
            text-align: center;
            margin-top: 12px;
            font-size: 1rem;
        }
        #epoch-link a {
            color: #0066cc;
            text-decoration: underline;
        }
        #epoch-link a:hover {
            color: #004499;
        }

        #loading {
            font-size: 1.3rem;
            color: #6b5e4e;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        footer {
            font-size: 1rem;
            color: #6b5e4e;
            text-align: center;
            line-height: 1.5;
            margin-top: 2rem;
            border-top: 1px solid rgba(139, 69, 19, 0.15);
            padding-top: 1rem;
        }
        footer small {
            display: block;
            margin-top: 0.5rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="fact-container">
        <h1>On This Day in History</h1>
        <div id="date-header"></div>
        <p id="fact"></p>

        <div id="controls">
            <label for="Century">Filter by Century: </label>
            <select id="Century">
                <option value="all">All Centuries</option>
                <option value="ancient">Before 1700</option>
                <option value="1700">1700s</option>
                <option value="1800">1800s</option>
                <option value="1900">1900s</option>
                <option value="2000">2000s+</option>
            </select>

            <div id="epoch-link">
                <a href="https://www.epoch-us.com" target="_blank">Epoch</a>
            </div>
        </div>

        <div id="loading">Loading your historical moment...</div>

        <footer>
            <p>Tap your NFC bracelet again for a new fact.<br>
            Come back tomorrow for fresh moments from this day in history.</p>
            <small>
                Historical facts sourced from <a href="https://history.muffinlabs.com/">Muffin Labs</a> (CC BY-SA 3.0). 
                © 2026 Epoch. All original content reserved.
            </small>
        </footer>
    </div>

    <script>
        function shuffleArray(array) {
            const shuffled = array.slice();
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        const now = new Date();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const monthName = now.toLocaleString('default', { month: 'long' });

        document.getElementById('date-header').textContent = `On this day, ${monthName} ${day}...`;

        let allEvents = [];
        let currentFilter = 'all';

        function getDecade(yearStr) {
            const yearNum = parseInt(yearStr.replace(/\D/g, ''), 10);
            if (isNaN(yearNum) || yearNum < 1700) return 'ancient';
            const century = Math.floor(yearNum / 100) * 100;
            return century.toString();
        }

        function filterEvents(events, filter) {
            if (filter === 'all') return events;
            if (filter === 'ancient') {
                return events.filter(e => {
                    const y = parseInt(e.year.replace(/\D/g, ''), 10);
                    return !isNaN(y) && y < 1700;
                });
            }
            return events.filter(e => getDecade(e.year) === filter);
        }

        function displayFact() {
            const factEl = document.getElementById('fact');
            const loadingEl = document.getElementById('loading');

            if (allEvents.length > 0) {
                const filtered = filterEvents(allEvents, currentFilter);
                const shuffled = shuffleArray(filtered.length > 0 ? filtered : allEvents);
                
                if (shuffled.length > 0) {
                    const event = shuffled[0];
                    factEl.innerHTML = `In <strong>${event.year}</strong>: ${event.text}`;
                } else {
                    factEl.textContent = "No facts available for this filter.";
                }
            } else {
                factEl.textContent = "No historical events found for today.";
            }
            loadingEl.style.display = 'none';
        }

        document.getElementById('loading').textContent = "Fetching today's history...";

        fetch(`https://history.muffinlabs.com/date/${month}/${day}`)
            .then(response => {
                if (!response.ok) throw new Error('Network error');
                return response.json();
            })
            .then(data => {
                allEvents = data.data.Events || [];
                displayFact();
            })
            .catch(error => {
                console.error(error);
                document.getElementById('fact').innerHTML = `
                    <strong>Unable to load facts at the moment.</strong><br><br>
                    This sometimes happens when opening the site via NFC.<br>
                    Please try opening <strong>ourhistory.epoch-us.com</strong> normally in your browser.
                `;
                document.getElementById('loading').style.display = 'none';
            });

        document.getElementById('Century').addEventListener('change', (e) => {
            currentFilter = e.target.value;
            displayFact();
        });
    </script>
</body>
</html>
